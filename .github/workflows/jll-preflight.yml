name: JLL preflight

# Pre-flight CI for the Construct2D_jll build recipe: builds the BinaryBuilder
# recipe on Linux and runs the wrapper's end-to-end test against the freshly
# built binary (the test that is auto-skipped when no binary is present).
#
# This does NOT publish Construct2D_jll. Publishing is the Yggdrasil PR: copy
# .ci/build_tarballs.jl to Yggdrasil's C/Construct2D/build_tarballs.jl and open a
# PR; Yggdrasil's CI then builds every platform and registers the JLL in General.

on:
  workflow_dispatch:
  push:
    branches: [main, master]
    paths:
      - '.ci/build_tarballs.jl'
      - 'src/**'
      - 'test/**'
      - '.github/workflows/jll-preflight.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: julia-actions/setup-julia@v2
        with:
          # Pin to a BinaryBuilder-stable line rather than bleeding-edge '1';
          # bump if BinaryBuilder supports a newer release.
          version: '1.11'
      - uses: julia-actions/cache@v2

      # Ubuntu 24.04 (current ubuntu-latest) restricts unprivileged user
      # namespaces via AppArmor, which BinaryBuilder's sandbox needs. Re-enable
      # them (harmless / no-op on older images).
      - name: Allow unprivileged user namespaces
        run: sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0 || true

      # The bare BinaryBuilder binary dynamically links libgfortran/libquadmath,
      # which aren't bundled (they come from CompilerSupportLibraries_jll). Make
      # sure they're present on the runner so we can execute it directly.
      - name: Install Fortran runtime libraries
        run: sudo apt-get update && sudo apt-get install -y gfortran

      - name: Install BinaryBuilder
        run: julia -e 'using Pkg; Pkg.add("BinaryBuilder")'

      # Build ONE platform that matches the runner so the binary is executable
      # here. Drop the trailing platform arg to build the full platform matrix
      # instead (no run step, then — they wouldn't be runnable on this host).
      - name: Build tarball
        run: julia .ci/build_tarballs.jl --verbose x86_64-linux-gnu-libgfortran5

      - name: Extract product
        run: |
          mkdir -p extracted
          tar xzf products/Construct2D*.tar.gz -C extracted
          find extracted -maxdepth 3 -type f
          test -x extracted/bin/construct2d

      - name: Run wrapper tests against the built binary
        env:
          CONSTRUCT2D_EXE: ${{ github.workspace }}/extracted/bin/construct2d
        run: |
          julia --project=. -e 'using Pkg; Pkg.instantiate(); include("test/runtests.jl")'

      - name: Upload tarball(s)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: construct2d-jll-tarballs
          path: products/*.tar.gz
          if-no-files-found: warn
